name: DeepSeek Inline PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pull_number:
        description: PR number to review
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: deepseek-inline-review-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pull_number || github.run_id }}
  queue: max
  cancel-in-progress: false

jobs:
  review:
    name: Hunk-level inline review
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: >
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.draft == false &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/deepseek review') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      ) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout reviewer from default branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Verify reviewer files
        run: |
          test -f .github/scripts/deepseek-inline-review.mjs
          test -f .github/deepseek-reviewer.json

      - name: Run DeepSeek inline reviewer
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
          REVIEW_CONFIG_PATH: .github/deepseek-reviewer.json
          REVIEW_COMMAND: /deepseek review
          DRY_RUN: ${{ vars.DRY_RUN }}
        run: node .github/scripts/deepseek-inline-review.mjs
